name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Install Playwright
        run: pnpm --filter @groffee/web exec playwright install --with-deps chromium

      - name: Start production server
        run: pnpm --filter @groffee/web start &
        env:
          PORT: "3000"

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run e2e tests
        run: pnpm --filter @groffee/web test:e2e:prod

      - name: Stop server
        if: always()
        run: kill %1 || true
