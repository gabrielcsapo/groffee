pipelines:
  ci:
    on:
      push:
        branches: [main, master]
      pull_request:
        branches: [main, master]
      manual: true

    concurrency:
      group: "ci-${{ ref }}"
      cancel_in_progress: true

    jobs:
      lint:
        name: Lint
        image: node:22-slim
        timeout: 120
        steps:
          - name: Install pnpm
            run: mkdir -p "$HOME/.local/bin" && corepack enable --install-directory "$HOME/.local/bin"
          - name: Install dependencies
            run: pnpm install --frozen-lockfile
          - name: Lint
            run: pnpm lint

      typecheck:
        name: Typecheck
        image: node:22-slim
        timeout: 180
        steps:
          - name: Install pnpm
            run: mkdir -p "$HOME/.local/bin" && corepack enable --install-directory "$HOME/.local/bin"
          - name: Install dependencies
            run: pnpm install --frozen-lockfile
          - name: Typecheck
            run: pnpm typecheck

      build:
        name: Build
        image: node:22-slim
        needs: [typecheck]
        timeout: 300
        steps:
          - name: Install pnpm
            run: mkdir -p "$HOME/.local/bin" && corepack enable --install-directory "$HOME/.local/bin"
          - name: Install dependencies
            run: pnpm install --frozen-lockfile
          - name: Build
            run: pnpm build
        artifacts:
          upload:
            - name: build-output
              path: packages/web/dist

      test:
        name: E2E Tests
        image: mcr.microsoft.com/playwright:v1.60.0-noble
        needs: [build]
        timeout: 600
        steps:
          - name: Install pnpm
            run: mkdir -p "$HOME/.local/bin" && corepack enable --install-directory "$HOME/.local/bin"
          - name: Install dependencies
            run: pnpm install --frozen-lockfile
          - name: Build
            run: pnpm build
          - name: Unit tests
            run: pnpm --filter @groffee/web test:unit
          - name: Seed test data
            run: pnpm seed && pnpm make-admin alice
          - name: Start production server
            run: pnpm --filter @groffee/web start > /tmp/groffee.log 2>&1 &
          - name: Wait for server
            run: npx wait-on http://localhost:3000 --timeout 30000
          - name: Run E2E tests
            run: pnpm test
        artifacts:
          upload:
            - name: test-results
              path: test-results
