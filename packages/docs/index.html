<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groffee Docs</title>
    <!-- Self-hosted webfonts — same three families the live product uses
         (Inter Tight, JetBrains Mono, Fraunces). Preload + display=swap so
         the docs and the product share the exact same typographic feel. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/fraunces.woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/inter-tight.woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/jetbrains-mono.woff2"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/fonts/groffee-fonts.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        var d =
          t === "dark" || (t !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (d) document.documentElement.classList.add("dark");
      })();
    </script>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        } else {
          var l = location;
          if (l.search[1] === "/") {
            var decoded = l.search
              .slice(1)
              .split("&")
              .map(function (s) {
                return s.replace(/~and~/g, "&");
              })
              .join("?");
            var path = decoded.split("?");
            var newUrl =
              l.pathname.slice(0, -1) + path[0] + (path[1] ? "?" + path[1] : "") + l.hash;
            history.replaceState(null, null, newUrl);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
